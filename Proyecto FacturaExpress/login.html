<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FacturaExpress – Iniciar Sesión</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --accent:#1abc9c; --accent-dk:#148f77; --sidebar-bg:#0f1923; }
    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--sidebar-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Decoración de fondo */
    body::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,188,156,.12) 0%, transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,188,156,.08) 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }

    .login-wrapper {
      width: 420px;
      max-width: 95%;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .logo-box {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace;
      font-weight: 700; color: #fff; font-size: 22px;
    }

    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 20px; font-weight: 700;
      color: #1a2535;
    }

    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: #90a4ae;
      margin-bottom: 32px;
    }

    .input-field input:focus {
      border-bottom-color: var(--accent) !important;
      box-shadow: 0 1px 0 0 var(--accent) !important;
    }
    .input-field input:focus + label,
    .input-field input:focus ~ label {
      color: var(--accent) !important;
    }
    .input-field .prefix { color: #90a4ae; }
    .input-field input:focus ~ .prefix { color: var(--accent); }

    .btn-login {
      width: 100%;
      background-color: var(--accent) !important;
      height: 46px; line-height: 46px;
      font-size: 15px; font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 8px !important;
      margin-top: 8px;
    }
    .btn-login:hover { background-color: var(--accent-dk) !important; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #90a4ae;
    }

    .login-footer a { color: var(--accent); cursor: pointer; }

    /* Estado DIAN en login */
    .dian-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(26,188,156,0.1);
      color: var(--accent);
      padding: 5px 14px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      margin: 0 auto 24px;
      display: flex; justify-content: center;
    }

    .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .error-msg {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-box">F</div>
      <span class="logo-text">FacturaExpress</span>
    </div>
    <p class="login-subtitle">Sistema de Facturación Electrónica DIAN</p>

    <div class="dian-badge">
      <div class="pulse-dot"></div> Servidor DIAN Activo
    </div>

    <div class="input-field">
      <i class="material-icons prefix">person</i>
      <input id="loginUser" type="text" autocomplete="username">
      <label for="loginUser">Usuario / NIT</label>
    </div>

    <div class="input-field">
      <i class="material-icons prefix">lock</i>
      <input id="loginPass" type="password">
      <label for="loginPass">Contraseña</label>
    </div>

    <p class="error-msg" id="errorMsg" role="alert">
      <i class="material-icons" style="font-size:14px;vertical-align:middle;">error_outline</i>
      Usuario o contraseña incorrectos
    </p>

    <a id="loginSubmit" class="btn btn-login waves-effect waves-light">
      <i class="material-icons left">login</i>Iniciar Sesión
    </a>

    <div class="login-footer">
      ¿Olvidaste tu contraseña? <a>Recuperar acceso</a><br><br>
      ¿Problemas de acceso? <a>Contacte al administrador</a>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    M.AutoInit();

    const loginSubmit = document.getElementById('loginSubmit');
    if (loginSubmit) {
      loginSubmit.addEventListener('click', intentarLogin);
    }

    function intentarLogin() {
      const userEl = document.getElementById('loginUser');
      const passEl = document.getElementById('loginPass');
      const user = userEl.value.trim();
      const pass = passEl.value.trim();
      const err  = document.getElementById('errorMsg');

      if (user && pass) {
        err.style.display = 'none';
        window.location.href = 'index.html';
      } else {
        err.style.display = 'block';
        if (!user) userEl.focus();
        else if (!pass) passEl.focus();
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') intentarLogin();
    });
  });
</script>
</body>
</html>
